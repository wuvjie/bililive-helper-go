services:
  bililive-helper-go:
    build: .
    image: bililive-helper-go
    container_name: bililive-helper-go
    ports:
      # 宿主机端口:容器端口，访问 http://IP:5689
      - "5689:5000"
    volumes:
      # 录像存储目录（bililive-go 的录制输出所在位置）
      # 修改为你实际的 bililive-go 录像路径
      - /path/to/recordings:/recordings
      # 配置文件、日志、历史记录的持久化目录
      - /path/to/data:/data
    environment:
      # 录制视频根目录（含各主播子目录）
      # 修改为 volumes 中录像目录的容器内路径
      - TARGET_DIR=/recordings
      # 日志和配置文件存储目录
      - LOG_DIR=/data
      # 时区
      - TZ=Asia/Shanghai
      # --- 以下为可选配置，取消注释即可生效 ---
      # 登录密码（不设则首次启动时通过网页向导设置）
      # - PASSWORD=your_password
      # 使用 HTTPS 反向代理时设为 true
      # - COOKIE_SECURE=true
      # 任务完成通知（支持 Bark/Slack/飞书等兼容 Webhook）
      # - WEBHOOK_URL=https://your-webhook
      # API Token（用于外部程序通过 Bearer 认证调用接口）
      # - API_TOKEN=your_api_token
    # 健康检查
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: always
    # 资源限制（防止占用过多系统资源影响录制）
    deploy:
      resources:
        limits:
          cpus: '3.0'    # CPU 上限（建议留 1 核给录制进程）
          memory: 4G     # 内存上限（建议留一半给录制进程）
    # 日志轮转
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
