services:
  bililive-helper-go:
    build: .
    image: bililive-helper-go
    container_name: bililive-helper-go
    ports:
      - "5689:5000"
    volumes:
      # ⬇️ 改成你自己的 bililive-go 录像输出目录（宿主机路径:容器路径）
      - /bililive-go/recordings:/data/videos
      # ⬇️ 配置文件和日志的持久化目录，一般不用改
      - ./data:/data/logs
    environment:
      # 录像目录（与 volumes 中容器路径一致）
      - TARGET_DIR=/data/videos
      # 日志和配置目录（与 volumes 中容器路径一致）
      - LOG_DIR=/data/logs
      - TZ=Asia/Shanghai
      # --- 以下为可选配置，取消注释即可生效 ---
      # - PASSWORD=your_password            # 设置登录密码（不设则首次启动时通过向导设置）
      # - COOKIE_SECURE=true                # 使用 HTTPS 反向代理时启用
      # - WEBHOOK_URL=https://your-webhook  # 任务完成时发送通知（Bark/Slack/飞书等）
      # - API_TOKEN=your_api_token          # Bearer Token（用于外部 API 调用）
      # - PORT=5000                         # 容器内监听端口（一般不用改）
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: always
    deploy:
      resources:
        limits:
          cpus: '3.0'
          memory: 4G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
