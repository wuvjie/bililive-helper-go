services:
  bililive-helper-go:
    build: .
    image: bililive-helper-go
    container_name: bililive-helper-go
    ports:
      - "5689:5000"
    volumes:
      - /path/to/videos:/path/to/videos        # 录像存储目录挂载
      - /path/to/logs:/path/to/logs            # 配置和日志持久化
    environment:
      - TARGET_DIR=/path/to/videos
      - LOG_DIR=/path/to/logs
      - TZ=Asia/Shanghai
      # - PASSWORD=your_password          # 可选：通过环境变量设置密码（优先于初始化向导）
      # - COOKIE_SECURE=true              # HTTPS 反向代理时启用
      # - WEBHOOK_URL=https://your-webhook # 任务完成通知
      # - API_TOKEN=your_api_token        # Bearer Token 认证（用于 API 调用）
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: always
    deploy:
      resources:
        limits:
          cpus: '3.0'    # 4 核留 1 核给录制进程
          memory: 4G     # 8G 留 4G 给录制进程
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - app-network

# 使用前需创建网络：docker network create app-network
networks:
  app-network:
    external: true
